data:
  train_dir: /root/autodl-tmp/datasets/train2017
  val_dir: /root/autodl-tmp/datasets/val2017
  image_size: 256
  watermark_length: 64
  watermark_seed: 42
  train_watermark_mode: per_epoch
  val_watermark_mode: fixed
  max_train_images: 10000
  max_val_images: 1000

model:
  base_channels: 64
  cond_dim: 256
  use_pretrained_unet: false
  pretrained_path: null

diffusion:
  timesteps: 1000
  beta_schedule: linear
  wm_t_min: 0
  wm_t_max: 200
  train_t_start: 200
  sample_steps: 100

train:
  seed: 42
  deterministic: true
  batch_size: 32
  num_workers: 8
  lr: 0.00005
  epochs: 50
  device: cuda
  use_amp: true

  lambda_diff: 0.5
  lambda_img: 0.5
  lambda_wm: 8.0

  save_interval: 1
  sample_interval: 5000
  log_interval: 100

# Unified degradation entry point.
noise_layer:
  type: projector  # options: none, pimog, projector, mixed

  pimog:
    p: 1.0

  projector:
    p: 0.8
    gamma_range: [1.1, 1.8]
    brightness_gain: [1.00, 1.15]
    falloff_strength: [0.06, 0.20]
    hotspot_strength: [0.00, 0.10]
    hotspot_sigma: [0.5, 1.2]
    texture_strength: [0.015, 0.06]
    pixel_grid_strength: [0.00, 0.02]
    moire_strength: [0.00, 0.02]
    blur_sigma: [0.15, 0.8]
    blur_kernel_choices: [3, 5]
    blur_mix_range: [0.20, 0.70]
    perspective_distortion: [0.015, 0.06]
    lens_distortion: [0.00, 0.03]
    contrast_range: [0.78, 1.00]
    ambient_light_range: [0.00, 0.10]
    color_gain_range: [0.92, 1.08]
    color_bias_range: [-0.015, 0.015]
    noise_std_range: [0.000, 0.012]
    enable_gamma: true
    enable_falloff: true
    enable_hotspot: true
    enable_texture: true
    enable_pixel_grid: false
    enable_moire: false
    enable_blur: true
    enable_perspective: true
    enable_lens: false
    enable_ambient: true
    enable_color: true
    enable_noise: true

  # Optional stronger preset for later robustness fine-tuning. It is not used
  # by build_noise_layer unless copied into noise_layer.projector.
  projector_strong:
    p: 0.9
    gamma_range: [1.4, 2.2]
    brightness_gain: [1.00, 1.12]
    falloff_strength: [0.10, 0.32]
    hotspot_strength: [0.00, 0.15]
    hotspot_sigma: [0.4, 1.0]
    texture_strength: [0.02, 0.08]
    pixel_grid_strength: [0.00, 0.04]
    moire_strength: [0.00, 0.04]
    blur_sigma: [0.3, 1.3]
    blur_kernel_choices: [3, 5, 7]
    blur_mix_range: [0.35, 1.00]
    perspective_distortion: [0.02, 0.08]
    lens_distortion: [0.00, 0.03]
    contrast_range: [0.68, 1.00]
    ambient_light_range: [0.00, 0.16]
    color_gain_range: [0.88, 1.12]
    color_bias_range: [-0.025, 0.025]
    noise_std_range: [0.000, 0.020]
    enable_gamma: true
    enable_falloff: true
    enable_hotspot: true
    enable_texture: true
    enable_pixel_grid: true
    enable_moire: true
    enable_blur: true
    enable_perspective: true
    enable_lens: false
    enable_ambient: true
    enable_color: true
    enable_noise: true

  mixed_probs: [0.5, 0.5]

output:
  checkpoint_dir: ./checkpoints_stage1
  sample_dir: ./outputs_stage1/samples
  log_dir: ./outputs_stage1/logs
