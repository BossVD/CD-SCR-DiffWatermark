data:
  train_dir: /root/autodl-tmp/datasets/train2017
  val_dir: /root/autodl-tmp/datasets/val2017
  image_size: 1024
  watermark_length: 64
  watermark_seed: 42
  train_watermark_mode: per_epoch
  val_watermark_mode: fixed
  max_train_images: 10000
  max_val_images: 1000

model:
  base_channels: 64
  cond_dim: 256
  use_pretrained_unet: false
  pretrained_path: null

diffusion:
  timesteps: 1000
  beta_schedule: linear
  wm_t_min: 0
  wm_t_max: 200
  train_t_start: 200
  sample_steps: 100

train:
  seed: 42
  deterministic: true
  batch_size: 32
  num_workers: 8
  lr: 0.00005
  epochs: 50
  device: cuda
  use_amp: true

  lambda_diff: 0.5
  lambda_img: 0.5
  lambda_wm: 8.0

  save_interval: 1
  sample_interval: 5000
  log_interval: 100

# Unified degradation entry point.
noise_layer:
  type: projector  # options: none, pimog, oled, led, projector, mixed

  pimog:
    p: 1.0

  oled:
    p: 1.0
    subpixel_mode: pentile
    enable_tone: true
    enable_subpixel: true
    enable_display_blur: true
    enable_perspective: true
    enable_camera_blur: true
    enable_banding: true
    enable_view_color_shift: true
    enable_noise: true
    enable_reflection: true
    enable_resample: false
    use_jpeg: false
    gamma_range: [0.85, 1.25]
    contrast_range: [1.05, 1.35]
    saturation_range: [1.05, 1.45]
    black_crush_range: [0.00, 0.08]
    highlight_clip_prob: 0.30
    highlight_clip_range: [0.92, 1.00]
    brightness_jitter: 0.03
    color_gain_range: [0.96, 1.04]
    subpixel_prob: 0.70
    subpixel_strength_range: [0.03, 0.15]
    subpixel_blur_sigma_range: [0.20, 0.80]
    display_blur_sigma_range: [0.20, 0.80]
    perspective_strength_range: [0.00, 0.018]
    camera_blur_sigma_range: [0.40, 1.50]
    banding_prob: 0.50
    banding_strength_range: [0.015, 0.080]
    banding_frequency_range: [4.0, 32.0]
    banding_tilt_range: [-0.15, 0.15]
    view_color_shift_prob: 0.50
    view_color_shift_strength_range: [0.01, 0.08]
    reflection_prob: 0.35
    reflection_strength_range: [0.02, 0.12]
    haze_strength_range: [0.00, 0.06]
    noise_std_range: [0.002, 0.020]
    motion_blur_prob: 0.20
    motion_blur_kernel_range: [3, 9]
    resample_scale_range: [0.92, 1.08]
    jpeg_quality_range: [55.0, 95.0]

  led:
    p: 1.0
    severity: medium
    subpixel_mode: rgb_triplet
    dot_shape: gaussian
    pixel_pitch_min: 4
    pixel_pitch_max: 10
    grid_strength: 0.18
    dot_radius: [0.28, 0.40]
    dot_strength: [0.95, 1.16]
    downsample_min: 0.35
    downsample_max: 0.75
    bloom_strength: 0.12
    brightness_jitter: 0.15
    color_shift: 0.08
    moire_strength: 0.08
    view_falloff_strength: 0.12
    noise_std: 0.015
    enable_scanline: true
    scanline_prob: 0.35
    scanline_strength: [0.02, 0.07]
    scanline_frequency: [4.0, 18.0]
    enable_moire: true
    enable_perspective: true
    highlight_clip: true

  projector:
    p: 0.8
    gamma_range: [1.1, 1.8]
    brightness_gain: [1.00, 1.15]
    falloff_strength: [0.06, 0.20]
    hotspot_strength: [0.00, 0.10]
    hotspot_sigma: [0.5, 1.2]
    texture_strength: [0.015, 0.06]
    pixel_grid_strength: [0.00, 0.02]
    moire_strength: [0.00, 0.02]
    blur_sigma: [0.15, 0.8]
    blur_kernel_choices: [3, 5]
    blur_mix_range: [0.20, 0.70]
    perspective_distortion: [0.015, 0.06]
    lens_distortion: [0.00, 0.03]
    contrast_range: [0.78, 1.00]
    ambient_light_range: [0.00, 0.10]
    color_gain_range: [0.92, 1.08]
    color_bias_range: [-0.015, 0.015]
    noise_std_range: [0.000, 0.012]
    enable_gamma: true
    enable_falloff: true
    enable_hotspot: true
    enable_texture: true
    enable_pixel_grid: false
    enable_moire: false
    enable_blur: true
    enable_perspective: true
    enable_lens: false
    enable_ambient: true
    enable_color: true
    enable_noise: true

  # Optional stronger preset for later robustness fine-tuning. It is not used
  # by build_noise_layer unless copied into noise_layer.projector.
  projector_strong:
    p: 0.9
    gamma_range: [1.4, 2.2]
    brightness_gain: [1.00, 1.12]
    falloff_strength: [0.10, 0.32]
    hotspot_strength: [0.00, 0.15]
    hotspot_sigma: [0.4, 1.0]
    texture_strength: [0.02, 0.08]
    pixel_grid_strength: [0.00, 0.04]
    moire_strength: [0.00, 0.04]
    blur_sigma: [0.3, 1.3]
    blur_kernel_choices: [3, 5, 7]
    blur_mix_range: [0.35, 1.00]
    perspective_distortion: [0.02, 0.08]
    lens_distortion: [0.00, 0.03]
    contrast_range: [0.68, 1.00]
    ambient_light_range: [0.00, 0.16]
    color_gain_range: [0.88, 1.12]
    color_bias_range: [-0.025, 0.025]
    noise_std_range: [0.000, 0.020]
    enable_gamma: true
    enable_falloff: true
    enable_hotspot: true
    enable_texture: true
    enable_pixel_grid: true
    enable_moire: true
    enable_blur: true
    enable_perspective: true
    enable_lens: false
    enable_ambient: true
    enable_color: true
    enable_noise: true

  mixed:
    candidates: [pimog, oled, led, projector]
    probs: [0.25, 0.25, 0.25, 0.25]

  # Backward-compatible mixed probabilities for configs that do not define
  # noise_layer.mixed.candidates. Interpreted as [pimog, projector].
  mixed_probs: [0.5, 0.5]

output:
  checkpoint_dir: ./checkpoints_stage1
  sample_dir: ./outputs_stage1/samples
  log_dir: ./outputs_stage1/logs
