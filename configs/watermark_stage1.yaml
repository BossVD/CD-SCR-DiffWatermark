data:
  train_dir: /root/autodl-tmp/datasets/train2017
  val_dir: /root/autodl-tmp/datasets/val2017
  image_size: 128
  watermark_length: 64
  watermark_seed: 42
  train_watermark_mode: per_epoch
  val_watermark_mode: fixed
  max_train_images: 10000
  max_val_images: 1000

model:
  base_channels: 64
  cond_dim: 256
  use_pretrained_unet: false
  pretrained_path: null

decoder:
  type: residual_multiscale
  base_channels: 32
  hidden_dim: 512
  dropout: 0.1
  norm_groups: 8
  use_multiscale: true

diffusion:
  timesteps: 1000
  beta_schedule: linear
  wm_t_min: 0
  wm_t_max: 200
  train_t_start: 200
  sample_steps: 100

train:
  seed: 42
  deterministic: true
  batch_size: 32
  num_workers: 8
  lr: 0.0001
  epochs: 50
  device: cuda
  use_amp: true

  lambda_diff: 1.0
  lambda_img: 1.0
  lambda_wm: 5.0

  save_interval: 1
  sample_interval: 5000
  log_interval: 100
  reset_decoder: false

# Stage 1 trains clean embedding/extraction only.
noise_layer:
  type: none

output:
  checkpoint_dir: ./checkpoints_stage1
  sample_dir: ./outputs_stage1/samples
  log_dir: ./outputs_stage1/logs
