data:
  train_dir: /root/autodl-tmp/datasets/train2017
  val_dir: /root/autodl-tmp/datasets/val2017
  image_size: 128
  watermark_length: 16
  watermark_seed: 42
  train_watermark_mode: random
  val_watermark_mode: deterministic_random
  max_train_images: 10000
  max_val_images: 1000

model:
  base_channels: 64
  cond_dim: 256
  use_pretrained_unet: false
  pretrained_path: null
  use_watermark_time_emb: true
  use_watermark_spatial_map: true
  wm_map_channels: 4
  wm_map_size: 16
  wm_time_scale: 1.0
  wm_map_scale: 1.0

decoder:
  type: residual_multiscale
  base_channels: 32
  hidden_dim: 512
  dropout: 0.1
  norm_groups: 8
  use_multiscale: true

diffusion:
  timesteps: 1000
  beta_schedule: linear
  wm_t_min: 0
  wm_t_max: 200
  train_t_start: 200
  sample_steps: 100

train:
  seed: 42
  deterministic: true
  batch_size: 32
  num_workers: 8
  lr: 0.00002
  epochs: 60
  device: cuda
  use_amp: true
  stage: robust_mixed

  lambda_diff: 0.0
  lambda_img: 2.0
  lambda_wm: 4.0
  lambda_delta: 0.02
  lambda_tv: 0.05
  lambda_topk: 0.10
  lambda_channel: 0.05
  topk_delta_fraction: 0.01
  max_grad_norm: 1.0
  skip_nonfinite: true
  amp_init_scale: 256
  amp_growth_interval: 1000
  detect_anomaly: false

  use_loss_schedule: false
  loss_schedule: []

  stages:
    robust_mixed:
      loss_schedule:
        - until_step: 3000
          lambda_diff: 0.00
          lambda_img: 2.0
          lambda_wm: 4.0
          lambda_delta: 0.02
          lambda_tv: 0.05
          lambda_topk: 0.10
          lambda_channel: 0.05
        - until_step: 6000
          lambda_diff: 0.00
          lambda_img: 1.8
          lambda_wm: 5.0
          lambda_delta: 0.02
          lambda_tv: 0.04
          lambda_topk: 0.08
          lambda_channel: 0.04
        - until_step: 12000
          lambda_diff: 0.00
          lambda_img: 1.5
          lambda_wm: 6.0
          lambda_delta: 0.015
          lambda_tv: 0.03
          lambda_topk: 0.06
          lambda_channel: 0.03
        - until_step: 999999999
          lambda_diff: 0.00
          lambda_img: 1.2
          lambda_wm: 7.0
          lambda_delta: 0.01
          lambda_tv: 0.02
          lambda_topk: 0.04
          lambda_channel: 0.02

  save_interval: 1
  sample_interval: 2000
  log_interval: 100
  debug_interval: 500
  reset_decoder: false

# Stage 2 starts from a Stage 1 checkpoint and trains robustness under a
# mixed screen/projector degradation distribution.
noise_layer:
  type: mixed

  pimog:
    p: 1.0

  oled:
    p: 1.0
    train_safe: true
    debug_finite: false
    sensor_noise_eps: 0.0001
    final_nan_to_num: true
    subpixel_mode: pentile
    enable_tone: true
    enable_subpixel: true
    enable_display_blur: true
    enable_perspective: false
    enable_camera_blur: true
    enable_banding: false
    enable_view_color_shift: true
    enable_noise: true
    enable_reflection: false
    enable_resample: false
    use_jpeg: false
    gamma_range: [0.90, 1.15]
    contrast_range: [1.00, 1.20]
    saturation_range: [1.00, 1.25]
    black_crush_range: [0.00, 0.03]
    highlight_clip_prob: 0.10
    highlight_clip_range: [0.95, 1.00]
    brightness_jitter: 0.02
    color_gain_range: [0.98, 1.02]
    subpixel_prob: 0.50
    subpixel_strength_range: [0.02, 0.08]
    subpixel_blur_sigma_range: [0.20, 0.50]
    display_blur_sigma_range: [0.20, 0.60]
    perspective_strength_range: [0.00, 0.008]
    camera_blur_sigma_range: [0.30, 1.00]
    banding_prob: 0.20
    banding_strength_range: [0.005, 0.025]
    banding_frequency_range: [4.0, 16.0]
    banding_tilt_range: [-0.08, 0.08]
    view_color_shift_prob: 0.40
    view_color_shift_strength_range: [0.005, 0.035]
    reflection_prob: 0.10
    reflection_strength_range: [0.00, 0.04]
    haze_strength_range: [0.00, 0.02]
    noise_std_range: [0.001, 0.010]
    motion_blur_prob: 0.20
    motion_blur_kernel_range: [3, 9]
    resample_scale_range: [0.92, 1.08]
    jpeg_quality_range: [55.0, 95.0]

  led:
    p: 1.0
    severity: mild
    subpixel_mode: rgb_triplet
    dot_shape: gaussian
    pixel_pitch_min: 4
    pixel_pitch_max: 8
    grid_strength: 0.08
    dot_radius: [0.28, 0.40]
    dot_strength: [0.95, 1.16]
    downsample_min: 0.55
    downsample_max: 0.85
    bloom_strength: 0.08
    brightness_jitter: 0.06
    color_shift: 0.03
    moire_strength: 0.025
    view_falloff_strength: 0.12
    noise_std: 0.006
    enable_scanline: false
    scanline_prob: 0.20
    scanline_strength: [0.01, 0.035]
    scanline_frequency: [4.0, 18.0]
    enable_moire: true
    enable_perspective: false
    highlight_clip: true

  projector:
    p: 1.0
    gamma_range: [1.05, 1.35]
    brightness_gain: [0.95, 1.05]
    falloff_strength: [0.06, 0.20]
    hotspot_strength: [0.00, 0.10]
    hotspot_sigma: [0.5, 1.2]
    texture_strength: [0.00, 0.04]
    pixel_grid_strength: [0.00, 0.02]
    moire_strength: [0.00, 0.02]
    blur_sigma: [0.10, 0.50]
    blur_kernel_choices: [3, 5]
    blur_mix_range: [0.20, 0.70]
    perspective_distortion: [0.015, 0.06]
    lens_distortion: [0.00, 0.03]
    contrast_range: [0.85, 1.00]
    ambient_light_range: [0.00, 0.10]
    color_gain_range: [0.97, 1.03]
    color_bias_range: [-0.015, 0.015]
    noise_std_range: [0.001, 0.008]
    enable_gamma: true
    enable_falloff: true
    enable_hotspot: true
    enable_texture: true
    enable_pixel_grid: false
    enable_moire: false
    enable_blur: true
    enable_perspective: false
    enable_lens: false
    enable_ambient: true
    enable_color: true
    enable_noise: true

  mixed:
    # Curriculum stage 1: stabilize robust fine-tuning on gentler layers first.
    # Stage 2 suggestion: add mild LED after the first diagnostic run is stable.
    # Stage 3 suggestion: add projector only after LED remains stable.
    candidates: [pimog, oled, led]
    probs: [0.50, 0.30, 0.20]

output:
  checkpoint_dir: ./checkpoints_stage2_amp_add_led
  sample_dir: ./outputs_stage2_amp_add_led/samples
  log_dir: ./outputs_stage2_amp_add_led/logs
